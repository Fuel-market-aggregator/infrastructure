version: "3.8"

services:
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: db_password 
      POSTGRES_DB: fuel_market_db
    networks:
      - data-tier
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == worker

volumes:
  pg_data:

networks:
  front-tier:
    driver: overlay
    attachable: true
  app-tier:
    driver: overlay
    attachable: true
  data-tier:
    driver: overlay
    attachable: true