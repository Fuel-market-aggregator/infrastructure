version: "3.8"

services:
  postgres-db:
    image: postgres:15-alpine
    deploy:
      placement:
        constraints: [node.role == manager]
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: db_password 
      POSTGRES_DB: fuel_market_db
    networks:
      - data-tier
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_admin -d fuel_market_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  io-service:
    image: ato22/fuel-io-service:latest
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: db_password
      POSTGRES_HOST: postgres-db
      POSTGRES_DB: fuel_market_db
    networks:
      - data-tier
    ports:
      - "8000:8000"
    depends_on:
      - postgres-db

  scraper-service:
    image: ato22/fuel-scraper-service:latest
    environment:
      IO_SERVICE_URL: http://io-service:8000 
    networks:
      - app-tier
      - data-tier
    depends_on:
      - io-service

  auth-service:
    image: ato22/fuel-auth-service:latest
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: db_password
      POSTGRES_HOST: postgres-db
      POSTGRES_DB: fuel_market_db
    networks:
      - app-tier
      - data-tier
    depends_on:
      - postgres-db

  db-util:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - data-tier
    depends_on:
      - postgres-db

  kong:
    image: kong:latest
    user: "root"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    volumes:
      - /stack/kong-config:/opt/kong
    deploy:
      placement:
        constraints: [node.role == manager]
    networks:
      - front-tier
      - app-tier
      - logging-tier
    ports:
      - "80:8000"   
      - "8443:8443"
    depends_on:
      - auth-service
      - io-service
      - scraper-service

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/config.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - logging-tier
      - app-tier
    deploy:
      placement:
        constraints: [node.role == manager]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - logging-tier
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    deploy:
      placement:
        constraints: [node.role == manager]

volumes:
  pg_data:

networks:
  front-tier:
    driver: overlay
  app-tier:
    driver: overlay
  data-tier:
    driver: overlay
    #internal: true
  logging-tier:
    driver: overlay
