_format_version: "3.0"
_transform: true

plugins:
  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true

services:
  - name: auth-service
    url: http://auth-service:8002
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: true 

  - name: scraper-service
    url: http://scraper-service:8001
    routes:
      - name: scraper-route
        paths:
          - /scraper
        strip_path: true